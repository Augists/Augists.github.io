<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>404 Pages</title>
        <style type="text/css">
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: consolas;
            }

<pre><code>        .error &#123;
            min-height: 100vh;
            background: linear-gradient(0deg, #fff, #03a9f4);
        &#125;

        .sky &#123;
            position: relative;
            widows: 100%;
            height: 65vh;
            display: flex;
            justify-content: center;
            align-items: center;
        &#125;

        .sky h2 &#123;
            font-size: 16em;
            color: #fff;
            text-shadow: 15px 15px 0 rgba(0, 0, 0, 0.1);
        &#125;

        .sky h2 span &#123;
            display: inline-block;
            animation: skyspan 2s ease-in-out infinite;
        &#125;

        .sky h2 span:nth-child(even) &#123;
            animation-delay: -1s;
        &#125;

        @keyframes skyspan &#123;
            0%, 100% &#123;
                transform: translateY(-50px);
            &#125;
            50% &#123;
                transform: translateY(50px);
            &#125;
        &#125;

        .field &#123;
            padding: 60px;
            height: 35vh;
            background: #6e2308;
            box-shadow: inset 0 20px 10px #51680c;
            text-align: center;
        &#125;

        .field h2 &#123;
            color: #fff;
            font-size: 2em;
            margin-bottom: 20px;
        &#125;

        .field a &#123;
            background: #fff;
            color: #000;
            width: 160px;
            height: 50px;
            line-height: 50px;
            border-radius: 50px;
            display: inline-block;
            text-decoration: none;
            font-size: 20px;
        &#125;

        .plane &#123;
            position: absolute;
            bottom: 100px;
            left: 200px;
            max-width: 300px;
        &#125;

        .grass &#123;
            position: absolute;
            padding-top: 100px;
            bottom: -10px;
            width: 100%;
            height: 150px;
            background: url(https://i.loli.net/2020/10/03/X37OnGktzWMcplN.png);
            background-position: bottom;
            background-size: 40%;
            animation: animateGrass 5s linear infinite;
        &#125;

        @keyframes animateGrass &#123;
            0% &#123;
                background-position: 0 0;
            &#125;
            100% &#123;
                background-position: -869px 0;
            &#125;
        &#125;
    &lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
    &lt;div class=&quot;error&quot;&gt;
        &lt;div class=&quot;sky&quot;&gt;
            &lt;h2&gt;&lt;span&gt;4&lt;/span&gt;&lt;span&gt;0&lt;/span&gt;&lt;span&gt;4&lt;/span&gt;&lt;/h2&gt;
            &lt;div class=&quot;grass&quot;&gt;&lt;/div&gt;
            &lt;img src=&quot;https://i.loli.net/2020/10/03/6OkbYH49vQ3WA75.png&quot; class=&quot;plane&quot;&gt;
        &lt;/div&gt;
        &lt;div class=&quot;field&quot;&gt;
            &lt;h2&gt;Opps...looks like you got lost.&lt;/h2&gt;
            &lt;a href=&quot;https://www.augists.top&quot;&gt;Go Home&lt;/a&gt;
        &lt;/div&gt;
    &lt;/div&gt;
&lt;/body&gt;</code></pre></html>
